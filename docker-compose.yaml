version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: mavilapospos-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mavilapos-network

  backend:
    container_name: mavilapos-api
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${SERVER_PORT}:80"

    depends_on:
      - postgres

    networks:
      - mavilapos-network

volumes:
  postgres_data:
  mongo_data:

networks:
  mavilapos-network:
    driver: bridge