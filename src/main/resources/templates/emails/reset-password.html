<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Recuperação de Senha</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            padding: 40px 0;
        }

        .card {
            max-width: 600px;
            margin: auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        .header {
            background: #111827;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .content {
            padding: 40px;
            color: #374151;
        }

        .content h2 {
            margin-top: 0;
        }

        .button {
            display: inline-block;
            padding: 14px 24px;
            margin-top: 25px;
            background: #2563eb;
            color: white !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .footer {
            padding: 25px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            background: #f9fafb;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <div class="header">
            <h1>MavilaPOS</h1>
        </div>

        <div class="content">

            <h2>Recuperação de Senha</h2>

            <p>
                Olá <strong th:text="${name}"></strong>,
            </p>

            <p>
                Recebemos uma solicitação para redefinir sua senha.
            </p>

            <p>
                Clique no botão abaixo para criar uma nova senha:
            </p>

            <a
                    th:href="${resetLink}"
                    class="button"
            >
                Redefinir Senha
            </a>

            <p style="margin-top: 30px;">
                Este link expira em 30 minutos.
            </p>

            <p>
                Se você não solicitou esta alteração,
                ignore este email.
            </p>

        </div>

        <div class="footer">
            © 2026 MavilaPOS • Angola
        </div>

    </div>

</div>

</body>
</html>
